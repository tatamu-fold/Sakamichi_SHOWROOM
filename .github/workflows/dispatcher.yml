name: Dispatcher to Trigger Download

on:
  schedule:
    - cron: '0 4 * * *'  # 13:00 JST
  workflow_dispatch:
    inputs:
      target_hour:
        description: 'Target hour for monitoring (e.g. 15-22)'
        required: false
        default: ''

jobs:
  dispatcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run dispatcher script
        run: python dispatcher.py
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ github.repository }} #your-username/your-repo 
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET_HOUR: ${{ inputs.target_hour }}
